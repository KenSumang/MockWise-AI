<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Page</title>
    <link rel="icon" href="../images/Logo.png">
    <link rel="stylesheet" href="output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Afacad:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="font-afacad h-screen bg-white">
    <div class="sidebar">
        <div class="header__wrapper lg:h-[50px] md:h-[65px] h-[35px] flex text-[#FAFAFA] justify-between items-center">
            <div class="header__logo">
                <a href="#" class="flex lg:gap-[13px] md:gap-[11px] sm:gap-[9px] gap-[8px] items-center">
                    <h2 class="lg:text-[58px] md:text-[48px] text-[38px]">M</h2>
                    <h2 class="lg:text-[29px] md:text-[25px] text-[22px]">MockWise <span class="font-bold">AI</span></h2>
                </a>
            </div>
        </div>
        <hr>
        <div class="menu">
            <div><a href=""><i class="bi bi-person-workspace"></i> Generate Interview</a></div>
            <div><a href="/dist/progresstracking.html"><i class="bi bi-graph-up-arrow"></i> Progress Tracking</a></div>
            <div><a href=""><i class="bi bi-clock-history"></i> Record History</a></div>
            <div id="setting-page"><a href="/dist/settingspage.html"><i class="bi bi-gear"></i> Settings</a></div>
            <hr style="padding-top: 20px; visibility: hidden;">
            <div><a href="/dist/index.html"><i class="bi bi-box-arrow-right"></i> Log Out</a></div>
        </div>
    </div>
    
    <div class="content">
        <h1>Profile Info</h1>
        <div class="form-section">
            <h2>Update Profile</h2>
            <div class="flex justify-between items-center">
                <div>
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" placeholder="Peter" size="40">
                </div>
                <div>
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" placeholder="Griffin" size="40">
                </div>
            </div>

            <div class="flex justify-between items-center">
                <div>
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="thepetergriffin" size="40">
                </div>
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="hello@mockwise.ai" size="40">
                </div>
            </div>

            <div class="flex justify-between items-center">
                <div>
                    <label for="gender">Interviewee Gender</label>
                    <select id="gender" style="width: 318px;">
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>
                <div>
                    <label for="accent">Accent</label>
                    <select id="accent" style="width: 318px;">
                        <option>American Accent</option>
                        <option>British Accent</option>
                    </select>
                </div>
            </div>
    
            <button class="btn">Save Changes</button>
        </div>
    
        <div class="form-section">
            <h2>Change Password</h2>

            <div class="flex justify-between items-center">
                <div>
                    <label for="current-password">Current Password</label>
                    <input type="password" id="current-password" placeholder="Current Password" size="40">
                </div>
                <div>
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" placeholder="New Password" size="40">
                </div>
            </div>
    
            <button class="btn">Save Changes</button>
        </div>
    </div>
</body>
</html>
