<body class="font-afacad h-screen bg-white">
    <div class="sidebar">
        <div class="header__wrapper lg:h-[50px] md:h-[65px] h-[35px] flex text-[#FAFAFA] justify-between items-center">
            <div class="header__logo">
                <a href="#" class="flex lg:gap-[13px] md:gap-[11px] sm:gap-[9px] gap-[8px] items-center">
                    <h2 class="lg:text-[58px] md:text-[48px] text-[38px]">M</h2>

                </a>
            </div>
        </div>
        <hr>
        <div class="menu">
            <div><a href=""><i class="bi bi-person-workspace"></i> Generate Interview</a></div>

            <div><a href="/dist/settingspage.html"><i class="bi bi-gear"></i> Settings</a></div>

    <div class="content-progress">
        <div class="progress_track" id="circle-track">
            <div class="outer">
                <div class="inner">

                        65&
                    </div>
                </div>
            </div>

            <svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="160px" height="160px">
                <defs>
                    <linearGradient id="GradientColor">
                        <stop offset="0%" stop-color="#DA22FF"/>
                        <stop offset="100%" stop-color="#9733EE"/>
                    </linearGradient>
                </defs>
                <circle cx="80" cy="80" r="70" stroke-linecap="round"/>
            </svg>
        </div>
        <label for="circle-track">Technology</label>
    </div>
